services:
  openclaw-backup:
    image: ghcr.io/alt-f1-openclaw/openclaw-backup-app:latest
    pull_policy: always
    user: "${UID:-1000}:${GID:-1000}"
    container_name: openclaw-backup
    ports:
      - "3100:3100"
    volumes:
      - ~/.openclaw:/config:ro
      - ~/.openclaw/workspace:/workspace:ro
      - ./backup-data:/backup
      - ~/.ssh:/ssh:ro
    environment:
      - BACKUP_APP_ENV=production
      - BACKUP_REMOTE_URL=git@github.com:ALT-F1-OpenClaw/openclaw-backup-data.git
      - SSH_KEY_NAME=openclaw-backup-bot-2026-02-21
      - GIT_SSH_COMMAND=ssh -i /ssh/openclaw-backup-bot-2026-02-21 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/known_hosts
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

