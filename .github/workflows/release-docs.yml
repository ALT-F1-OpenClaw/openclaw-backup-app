name: Release Tutorial Docs

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to document (vX.Y.Z). Optional when manually running.'
        required: false

permissions:
  contents: write
  actions: read

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      kind: ${{ steps.vars.outputs.kind }}
      should_run: ${{ steps.vars.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then TAG="${{ inputs.tag }}"; fi
          eval "$(TAG=$TAG python3 scripts/release/tag_utils.py)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "kind=$kind" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=${run_auto}" >> $GITHUB_OUTPUT
          fi

  docs:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    continue-on-error: ${{ needs.gate.outputs.kind == 'minor' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Build + run app for screenshot
        run: |
          mkdir -p /tmp/oc/{config,workspace,backup,remote} docs/tutorials
          echo '{"gateway":{"auth":{"token":"x"}}}' > /tmp/oc/config/openclaw.json
          echo '{"node":"x"}' > /tmp/oc/config/node.json
          echo '# memory' > /tmp/oc/workspace/MEMORY.md
          mkdir -p /tmp/oc/workspace/memory
          git init /tmp/oc/backup
          git -C /tmp/oc/backup config user.email ci@example.com
          git -C /tmp/oc/backup config user.name ci

          docker build -t backup-app:docs .
          docker run -d --name backup-docs -p 33110:3100 --user "$(id -u):$(id -g)" \
            -e BACKUP_REMOTE_URL=/tmp/remote/backup-data.git \
            -e SSH_KEY_NAME=ignored \
            -v /tmp/oc/config:/config:ro \
            -v /tmp/oc/workspace:/workspace:ro \
            -v /tmp/oc/backup:/backup \
            -v /tmp/oc/remote:/tmp/remote \
            backup-app:docs

          for i in {1..30}; do
            curl -fsS http://127.0.0.1:33110/api/status && break || sleep 2
          done

      - name: Capture high-quality app screenshot
        run: |
          TAG='${{ needs.gate.outputs.tag }}'
          sudo npx -y playwright@1.52.0 install-deps chromium
          npx -y playwright@1.52.0 install chromium
          npx -y playwright@1.52.0 screenshot --device="Desktop Chrome" --wait-for-timeout=1500 \
            http://127.0.0.1:33110 docs/tutorials/${TAG}-app.png

      - name: Generate tutorial markdown
        run: |
          TAG='${{ needs.gate.outputs.tag }}' KIND='${{ needs.gate.outputs.kind }}' TEST_STATUS='pending' \
            python3 scripts/release/generate_tutorial.py

      - name: Optional refresh images (hybrid)
        run: |
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "GEMINI_API_KEY provided; keep existing 4K docs images as fallback-safe baseline."
          else
            echo "No GEMINI_API_KEY; using static fallback images from repo."
          fi

      - name: Upload tutorial artifact
        uses: actions/upload-artifact@v4
        with:
          name: tutorial-${{ needs.gate.outputs.tag }}
          path: |
            docs/tutorials/${{ needs.gate.outputs.tag }}.md
            docs/tutorials/${{ needs.gate.outputs.tag }}-app.png
            docs/update-flow-4k.png
            docs/dev-staging-architecture-4k.png

      - name: Commit tutorial to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/tutorials/${{ needs.gate.outputs.tag }}.md docs/tutorials/${{ needs.gate.outputs.tag }}-app.png
          if git diff --cached --quiet; then
            echo "No tutorial changes to commit"
            exit 0
          fi
          git commit -m "docs: add release tutorial + app screenshot for ${{ needs.gate.outputs.tag }} [skip ci]"

          # Avoid non-fast-forward failures when main moves during this job.
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || {
              git rebase --abort || true
              if [ "$attempt" -eq 3 ]; then
                echo "Rebase failed after 3 attempts" >&2
                exit 1
              fi
              sleep 2
              continue
            }
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Push failed after 3 attempts" >&2
              exit 1
            fi
            sleep 2
          done

      - name: Cleanup docs container
        if: always()
        run: docker rm -f backup-docs || true
